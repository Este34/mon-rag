# CI = Integration Continue : verifications a chaque push / pull request.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  qualite:
    name: Qualite du code (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .
